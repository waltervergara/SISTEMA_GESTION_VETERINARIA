spring:
  application:
    name: facturacion

  datasource:
    url: jdbc:mysql://localhost:3306/pagos_facturas
    username: root
    password: ""

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    repeatable-sql-migration-prefix: true

  web:
    error:
      include-message: always
      include-binding-errors: always

server:
  port: 8088

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8100/eureka/