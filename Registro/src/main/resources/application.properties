spring.application.name=Registro

spring.datasource.url=jdbc:mysql://localhost:3306/Registro_Paciente
spring.datasource.username= root
spring.datasource.password= 

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled= true
spring.flyway.repeatable-sql-migration-prefix=true

spring.web.error.include-binding-errors=always
spring.web.error.include-message=always

eureka.client.serviceUrl.defaultZone=http://localhost:8100/eureka/


server.port=8080
