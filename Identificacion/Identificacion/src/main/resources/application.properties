# Nombre del servicio
spring.application.name=identificacion

# Configuración MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/vet_identity_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password= 

# Configuración JPA / Hibernate (Importante con Flyway: usamos "validate" para que Flyway maneje los cambios)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Configuración Flyway (Habrá que crear los scripts SQL)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Configuración JWT (El secreto para firmar los tokens)
jwt.secret=este_es_un_secreto_muy_seguro_para_la_veterinaria_que_debe_ser_largo
jwt.expiration=86400000

# Puerto fijo del Microservicio de Identidad
server.port=8085

# URL del Microservicio de Empleados 
empleados.service.url=http://localhost:8081

# URL del Microservicio de Registro
propietario.service.url=http://localhost:8080
