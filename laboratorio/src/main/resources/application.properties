spring.application.name=laboratorio


spring.datasource.url=jdbc:mysql://localhost:3306/registro_laboratorio
spring.datasource.username= root
spring.datasource.password= 

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled= true
spring.flyway.repeatable-sql-migration-prefix=true
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always

eureka.client.serviceUrl.defaultZone=http://localhost:8100/eureka/

server.port=8087