spring:
  application:
    name: HistorialMascota

  datasource:
    url: jdbc:mysql://localhost:3306/Registro_Historiales
    username: root
    password: ""

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    repeatable-sql-migration-prefix: true

  web:
    error:
      include-binding-errors: always
      include-message: always

server:
  port: 8099

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8100/eureka/