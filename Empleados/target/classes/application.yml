server:
  port: 8081

spring:
  application:
    name: empleados

  datasource:
    url: jdbc:mysql://localhost:3306/registro_empleados
    username: root
    password: ""

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    repeatable-sql-migration-prefix: true

  web:
    error:
      include-message: always
      include-binding-errors: always

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8100/eureka/